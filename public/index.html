<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar: list of conversations -->
      <aside id="sidebar" class="sidebar">
        <button id="new-convo" class="new-convo-btn">+ New chat</button>
        <input
          id="search"
          class="search-input"
          type="search"
          placeholder="Search chats..."
          autocomplete="off"
        />
        <div id="tag-filter" class="tag-filter"></div>
        <div id="convo-list" class="convo-list"></div>
        <button id="open-settings" class="settings-btn">Settings</button>
      </aside>

      <button id="sidebar-backdrop" class="sidebar-backdrop hidden" aria-label="Close menu"></button>

      <!-- Main chat area -->
      <div class="chat-container">
        <header class="chat-header">
          <button id="toggle-sidebar" class="icon-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
            &#9776;
          </button>
          <div class="status-dot"></div>
          <h1 id="convo-title">AI Chatbot</h1>
          <span id="usage" class="usage hidden" title="Estimated tokens in this conversation"></span>
          <div class="header-actions">
            <select id="model-picker" class="model-picker" title="Choose AI model"></select>
            <div class="export-wrap">
              <button id="export-btn" class="icon-btn" title="Export conversation">Export</button>
              <div id="export-menu" class="export-menu hidden">
                <button data-format="md">This chat: Markdown (.md)</button>
                <button data-format="txt">This chat: Text (.txt)</button>
                <button data-format="json">This chat: JSON (.json)</button>
                <button data-format="all">All chats: backup (.json)</button>
              </div>
            </div>
            <button id="theme-toggle" class="icon-btn" title="Toggle light/dark theme" aria-label="Toggle theme">
              Theme
            </button>
          </div>
        </header>

        <main id="messages" class="messages" aria-live="polite"></main>

        <button id="scroll-bottom" class="scroll-bottom hidden" title="Scroll to latest" aria-label="Scroll to latest">
          &#8595;
        </button>

        <div id="attachment" class="attachment hidden">
          <span id="attachment-name"></span>
          <button id="attachment-remove" title="Remove file">x</button>
        </div>

        <form id="chat-form" class="chat-form">
          <button
            id="attach"
            type="button"
            class="mic-btn"
            title="Attach PDF, Word, Excel, or text file"
            aria-label="Attach file"
          >
            &#128206;
          </button>
          <input
            id="file-input"
            type="file"
            class="hidden"
            accept=".pdf,.docx,.xlsx,.xls,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css,.log,.xml,.yml,.yaml,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
          />
          <button id="mic" type="button" class="mic-btn" title="Speak your message" aria-label="Voice input">
            &#127908;
          </button>
          <textarea
            id="input"
            class="input"
            placeholder="Type your message..."
            rows="1"
            autocomplete="off"
          ></textarea>
          <button id="send" type="submit" class="send-btn" aria-label="Send message">
            Send
          </button>
        </form>
        <div id="char-counter" class="char-counter hidden" aria-live="polite"></div>
      </div>
    </div>

    <!-- Settings modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Settings</h2>

        <label for="preset">Personality preset</label>
        <select id="preset" class="settings-input"></select>

        <label for="system-prompt">Custom personality (system prompt)</label>
        <textarea
          id="system-prompt"
          class="settings-input"
          rows="5"
          placeholder="Describe how the assistant should behave..."
        ></textarea>

        <label for="temperature">
          Creativity: <span id="temp-value">0.7</span>
        </label>
        <input id="temperature" type="range" min="0" max="1" step="0.1" value="0.7" />

        <label for="max-length">Response length</label>
        <select id="max-length" class="settings-input">
          <option value="256">Short</option>
          <option value="512" selected>Medium</option>
          <option value="1024">Long</option>
          <option value="0">Unlimited</option>
        </select>

        <label for="theme-select">Theme</label>
        <select id="theme-select" class="settings-input"></select>

        <label>Accent color</label>
        <div id="accent-row" class="accent-row"></div>

        <label class="toggle-row">
          <input type="checkbox" id="auto-scroll" />
          Auto-scroll to newest message
        </label>

        <div class="speech-mode-block">
          <span id="speech-mode-english-title" class="speech-mode-label">
            Quick setup — English accents
          </span>
          <p id="speech-mode-english-hint" class="speech-mode-hint"></p>
          <div id="speech-mode-english" class="speech-mode-chips"></div>
        </div>
        <div class="speech-mode-block">
          <div class="speech-mode-title-row">
            <span id="speech-mode-languages-title" class="speech-mode-label">
              Quick setup — languages
            </span>
            <span id="speech-mode-google-status" class="speech-mode-status hidden"></span>
          </div>
          <p id="speech-mode-languages-hint" class="speech-mode-hint"></p>
          <input
            id="speech-mode-lang-search"
            class="search-input speech-mode-search"
            type="search"
            placeholder="Filter languages (e.g. Hindi, Polish, es-MX)..."
            autocomplete="off"
          />
          <div id="speech-mode-languages" class="speech-mode-chips"></div>
        </div>

        <label class="toggle-row">
          <input type="checkbox" id="read-aloud" />
          Read replies aloud
        </label>

        <label class="toggle-row">
          <input type="checkbox" id="translate-to-english" />
          Translate my messages to English (for the AI)
        </label>

        <div id="translate-source-row" class="translate-source-row hidden">
          <label for="translate-source-lang">Only translate this language → English</label>
          <select id="translate-source-lang" class="settings-input"></select>
        </div>

        <label class="toggle-row">
          <input type="checkbox" id="show-translation" />
          Show English translation under my messages
        </label>

        <label class="toggle-row">
          <input type="checkbox" id="translate-for-speech" />
          Translate English replies to voice language when speaking
        </label>
        <div id="tts-controls">
          <label for="voice-select">Voice (fine-tune after quick setup)</label>
          <input
            id="voice-search"
            class="search-input"
            type="search"
            placeholder="Filter voices (e.g. Punjabi, Hindi, United Kingdom)..."
            autocomplete="off"
          />
          <select id="voice-select" class="settings-input voice-select"></select>
          <p id="voice-hint" class="voice-hint hidden"></p>

          <label for="speech-rate">
            Speaking speed: <span id="rate-value">1.0</span>x
          </label>
          <input id="speech-rate" type="range" min="0.5" max="2" step="0.1" value="1" />
        </div>

        <div class="modal-actions">
          <button id="reset-settings" class="icon-btn">Reset</button>
          <button id="save-settings" class="send-btn">Save</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
