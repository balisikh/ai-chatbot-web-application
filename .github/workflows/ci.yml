name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server and run smoke tests
        run: |
          PORT=3567 node server.js &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3567/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3567/ > /dev/null || (echo "Server failed to start" && exit 1)
          PORT=3567 TEST_BASE_URL=http://localhost:3567 npm test
